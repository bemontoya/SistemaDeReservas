# Configuración del servidor (Puerto donde corre el microservicio)
server.port=8084

# Configuración de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/cliente_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Configura la contraseńa de MySQL.
# Intenta leer la variable de entorno 'MYSQL_PASSWORD'
# Si no existe, usa la contraseńa por defecto 'C4dpeafg**'
spring.datasource.password=${MYSQL_PASSWORD:C4dpeafg**}

# Configuración de JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Flyway para las migraciones automáticas
spring.flyway.baseline-on-migrate=true